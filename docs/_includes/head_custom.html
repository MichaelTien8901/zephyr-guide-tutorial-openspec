<!-- Table styling for better visibility in dark mode -->
<style>
  /* Table borders - visible in dark mode */
  table {
    border-collapse: collapse !important;
    border: 1px solid #6b7280 !important;
  }

  table th,
  table td {
    border: 1px solid #6b7280 !important;
    padding: 8px 12px !important;
  }

  /* Table header - slightly different background */
  table th {
    background-color: rgba(107, 114, 128, 0.3) !important;
    font-weight: 600 !important;
  }

  /* Alternating row colors for readability */
  table tbody tr:nth-child(even) {
    background-color: rgba(107, 114, 128, 0.1) !important;
  }

  /* Hover effect */
  table tbody tr:hover {
    background-color: rgba(107, 114, 128, 0.2) !important;
  }
</style>

<!-- Mermaid diagrams with paper-like background -->
<style>
  /* Mermaid container - paper-like background.
     color-scheme: only light tells the browser (including Chrome Force Dark
     and GTK-integrated Chromium on Linux) that this subtree is intentionally
     light-themed, suppressing auto color inversion. */
  .mermaid,
  pre.mermaid,
  .language-mermaid,
  code.language-mermaid,
  svg[id^="mermaid-"] {
    background-color: #f0ebe2 !important;
    color-scheme: only light !important;
    forced-color-adjust: none !important;
  }
  .mermaid,
  pre.mermaid,
  .language-mermaid,
  code.language-mermaid {
    border-radius: 8px !important;
    padding: 16px !important;
    margin: 16px 0 !important;
    display: block !important;
  }

  /* Force fill on mermaid SVG text — beats auto-dark inversion. */
  svg[id^="mermaid-"] text,
  svg[id^="mermaid-"] tspan {
    fill: #1a1a1a !important;
  }
  svg[id^="mermaid-"] .edgePath path,
  svg[id^="mermaid-"] .flowchart-link,
  svg[id^="mermaid-"] path.arrowMarkerPath,
  svg[id^="mermaid-"] marker path {
    stroke: #2a2a2a !important;
    fill: #2a2a2a !important;
  }

  /* All text in Mermaid - dark gray */
  .mermaid text,
  .mermaid tspan,
  .mermaid .nodeLabel,
  .mermaid .label,
  .mermaid .edgeLabel,
  .mermaid .cluster-label,
  .mermaid .messageText,
  .mermaid .loopText,
  .mermaid .noteText,
  .mermaid .labelText,
  .mermaid .actor {
    fill: #2c3e50 !important;
    color: #2c3e50 !important;
  }

  /* All lines and arrows - dark gray */
  .mermaid path,
  .mermaid .edgePath path,
  .mermaid .flowchart-link,
  .mermaid .messageLine0,
  .mermaid .messageLine1,
  .mermaid .relation {
    stroke: #4a5568 !important;
  }

  /* Sequence diagram actor lifelines - force visible */
  line[id^="actor"] {
    stroke: #000000 !important;
    stroke-width: 0.5px !important;
  }

  /* Sequence diagram message lines */
  .mermaid .messageText {
    fill: #2c3e50 !important;
  }

  .mermaid .messageLine0,
  .mermaid .messageLine1 {
    stroke: #4a5568 !important;
    stroke-width: 1.5px !important;
  }

  .mermaid marker path,
  .mermaid .arrowheadPath {
    fill: #4a5568 !important;
    stroke: #4a5568 !important;
  }

  /* Node backgrounds - paper tones */
  .mermaid .node rect,
  .mermaid .node circle,
  .mermaid .node ellipse,
  .mermaid .node polygon,
  .mermaid .node path {
    fill: #c5c0b8 !important;
    stroke: #8a8578 !important;
  }

  /* Cluster backgrounds */
  .mermaid .cluster rect {
    fill: #cac5bd !important;
    stroke: #8a8578 !important;
  }

  /* Actor boxes in sequence diagrams */
  .mermaid .actor-box,
  .mermaid rect.actor {
    fill: #c5c0b8 !important;
    stroke: #8a8578 !important;
  }

  /* Notes - slightly warmer */
  .mermaid .note {
    fill: #ddd8c8 !important;
    stroke: #a89878 !important;
  }

  /* Mindmap nodes */
  .mermaid .mindmap-node rect,
  .mermaid .mindmap-node circle {
    fill: #c5c0b8 !important;
    stroke: #8a8578 !important;
  }

  .mermaid .mindmap-edges path {
    stroke: #4a5568 !important;
    stroke-width: 2px !important;
  }
</style>

<!-- Force mermaid text colors as inline SVG attributes — survives OS/browser color auto-adjust -->
<script>
(function() {
  function pinMermaidColors() {
    var svgs = document.querySelectorAll('svg[id^="mermaid-"]');
    for (var i = 0; i < svgs.length; i++) {
      var svg = svgs[i];
      svg.style.colorScheme = 'only light';
      svg.style.forcedColorAdjust = 'none';
      var texts = svg.querySelectorAll('text, tspan');
      for (var j = 0; j < texts.length; j++) {
        texts[j].setAttribute('fill', '#1a1a1a');
        texts[j].style.fill = '#1a1a1a';
      }
      var rects = svg.querySelectorAll('.node rect, .node circle, .node ellipse, .node polygon, .cluster rect, rect.actor, .actor-box');
      for (var k = 0; k < rects.length; k++) {
        rects[k].setAttribute('fill', '#ede8df');
        rects[k].setAttribute('stroke', '#6b6558');
        rects[k].style.fill = '#ede8df';
        rects[k].style.stroke = '#6b6558';
      }
      var paths = svg.querySelectorAll('.edgePath path, .flowchart-link, path.arrowMarkerPath, marker path');
      for (var p = 0; p < paths.length; p++) {
        paths[p].style.stroke = '#2a2a2a';
        paths[p].style.fill = '#2a2a2a';
      }
    }
    var lines = document.querySelectorAll('line[id^="actor"]');
    for (var l = 0; l < lines.length; l++) {
      lines[l].setAttribute('stroke', '#000000');
      lines[l].setAttribute('stroke-width', '0.5px');
    }
  }

  if (document.readyState === 'complete') {
    setTimeout(pinMermaidColors, 500);
    setTimeout(pinMermaidColors, 1500);
  } else {
    window.addEventListener('load', function() {
      setTimeout(pinMermaidColors, 500);
      setTimeout(pinMermaidColors, 1500);
      setTimeout(pinMermaidColors, 3000);
    });
  }
})();
</script>
